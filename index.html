<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>神日記 Ultimate</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:-apple-system;
margin:0;
background:#f5f7fb;
}

header{
background:#111;
color:white;
padding:16px;
text-align:center;
font-size:20px;
}

.container{
padding:16px;
max-width:800px;
margin:auto;
}

textarea{
width:100%;
height:90px;
border-radius:10px;
border:1px solid #ccc;
padding:10px;
font-size:16px;
}

button{
width:100%;
margin-top:8px;
padding:12px;
border:none;
border-radius:10px;
background:#007aff;
color:white;
font-size:16px;
}

.entry{
background:white;
margin-top:12px;
padding:12px;
border-radius:12px;
}

.media{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:6px;
margin-top:8px;
}

.media img,.media video{
width:100%;
border-radius:8px;
}

.calendarHeader{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:15px;
}

.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:4px;
margin-top:5px;
}

.day{
background:white;
padding:10px;
text-align:center;
border-radius:6px;
font-size:14px;
}

.hasDiary{
background:#ffe082;
}

.today{
border:2px solid #007aff;
}

.search{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid #ccc;
margin-bottom:10px;
}

</style>
</head>

<body>

<header>📔 神日記 Ultimate</header>

<div class="container">

<input id="search" class="search" placeholder="🔍 日記検索">

<h3>😊 気分</h3>

<select id="mood">
<option>😀</option>
<option>😍</option>
<option>😊</option>
<option>😐</option>
<option>😢</option>
<option>😡</option>
<option>😴</option>
</select>

<textarea id="text" placeholder="今日の出来事"></textarea>

<input type="file" id="media" multiple accept="image/*,video/*">

<button onclick="saveDiary()">保存</button>

<button onclick="getLocation()">📍位置情報</button>

<button onclick="backup()">☁️バックアップ</button>

<div class="calendarHeader">

<button onclick="prevMonth()">←</button>

<h3 id="monthLabel"></h3>

<button onclick="nextMonth()">→</button>

</div>

<div id="calendar" class="calendar"></div>

<h3>📚 日記</h3>

<div id="diary"></div>

</div>

<script>

let current=new Date();
let locationText="";

function getLocation(){

navigator.geolocation.getCurrentPosition(p=>{

locationText="📍"+p.coords.latitude.toFixed(3)+","+p.coords.longitude.toFixed(3);

alert("位置を保存しました");

});

}

function saveDiary(){

let text=document.getElementById("text").value+" "+locationText;

let mood=document.getElementById("mood").value;

let files=document.getElementById("media").files;

let media=[];

let loaded=0;

if(files.length===0){

store(text,mood,media);
return;

}

for(let f of files){

let reader=new FileReader();

reader.onload=e=>{

media.push({type:f.type,data:e.target.result});

loaded++;

if(loaded===files.length){

store(text,mood,media);

}

};

reader.readAsDataURL(f);

}

}

function store(text,mood,media){

let diary=JSON.parse(localStorage.getItem("diary")||"[]");

let d=new Date();

diary.unshift({

date:d.toLocaleString(),

year:d.getFullYear(),

month:d.getMonth(),

day:d.getDate(),

text:text,

mood:mood,

media:media

});

localStorage.setItem("diary",JSON.stringify(diary));

document.getElementById("text").value="";
document.getElementById("media").value="";

loadDiary();
buildCalendar();

}

function loadDiary(){

let diary=JSON.parse(localStorage.getItem("diary")||"[]");

let key=document.getElementById("search").value;

let html="";

diary.forEach(e=>{

if(key && !e.text.includes(key)) return;

html+=`

<div class="entry">

<div>${e.date} ${e.mood}</div>

<div>${e.text}</div>

<div class="media">

${e.media.map(m=>m.type.includes("video")

?`<video controls src="${m.data}"></video>`

:`<img src="${m.data}">`).join("")}

</div>

</div>

`;

});

document.getElementById("diary").innerHTML=html;

}

document.getElementById("search").oninput=loadDiary;

function buildCalendar(){

let diary=JSON.parse(localStorage.getItem("diary")||"[]");

let y=current.getFullYear();
let m=current.getMonth();

document.getElementById("monthLabel").innerText=y+"年"+(m+1)+"月";

let first=new Date(y,m,1).getDay();
let last=new Date(y,m+1,0).getDate();

let html="";

for(let i=0;i<first;i++) html+="<div></div>";

for(let d=1;d<=last;d++){

let cls="day";

if(diary.some(e=>e.year===y && e.month===m && e.day===d)){

cls+=" hasDiary";

}

let today=new Date();

if(d===today.getDate() && m===today.getMonth() && y===today.getFullYear()){

cls+=" today";

}

html+=`<div class="${cls}">${d}</div>`;

}

document.getElementById("calendar").innerHTML=html;

}

function prevMonth(){

current.setMonth(current.getMonth()-1);

buildCalendar();

}

function nextMonth(){

current.setMonth(current.getMonth()+1);

buildCalendar();

}

function backup(){

let data=localStorage.getItem("diary")||"[]";

let blob=new Blob([data],{type:"application/json"});

let a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="diary_backup.json";

a.click();

}

loadDiary();
buildCalendar();

</script>

</body>
</html>
