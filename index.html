<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">
<title>神日記 Ultimate Pro</title>

<meta name="viewport" content="width=device-width,initial-scale=1">

<link rel="manifest" href="manifest.json">

<style>

body{
font-family:-apple-system;
margin:0;
background:#f4f6fb;
}

header{
background:#000;
color:white;
padding:15px;
text-align:center;
font-size:20px;
}

.container{
padding:15px;
max-width:800px;
margin:auto;
}

textarea{
width:100%;
height:90px;
border-radius:10px;
padding:10px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
margin-top:8px;
border:none;
border-radius:10px;
background:#007aff;
color:white;
}

.entry{
background:white;
padding:12px;
margin-top:10px;
border-radius:12px;
}

.media{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:6px;
margin-top:8px;
}

.media img{
width:100%;
border-radius:8px;
cursor:pointer;
}

.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:5px;
margin-top:10px;
}

.day{
background:white;
padding:10px;
border-radius:8px;
text-align:center;
}

.hasDiary{
background:#ffe082;
}

.lock{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.graph{
margin-top:20px;
background:white;
padding:10px;
border-radius:10px;
}

</style>

</head>

<body>

<div id="lock" class="lock">

<h2>🔒 パスコード</h2>

<input id="pass" type="password">

<button onclick="unlock()">開く</button>

</div>

<header>📔 神日記 Ultimate Pro</header>

<div class="container">

<h3>😊 気分</h3>

<select id="mood">

<option>😀</option>
<option>😍</option>
<option>😊</option>
<option>😐</option>
<option>😢</option>
<option>😡</option>
<option>😴</option>

</select>

<textarea id="text" placeholder="今日の出来事"></textarea>

<input type="file" id="media" multiple accept="image/*">

<button onclick="saveDiary()">保存</button>

<button onclick="backup()">☁️バックアップ</button>

<h3>📅 カレンダー</h3>

<div id="calendar" class="calendar"></div>

<div id="diary"></div>

<div class="graph">

<h3>📊 気分グラフ</h3>

<canvas id="moodChart"></canvas>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

if(!localStorage.pass){

let p=prompt("パスコード設定");

localStorage.pass=p;

}

function unlock(){

if(document.getElementById("pass").value===localStorage.pass){

document.getElementById("lock").style.display="none";

}

}

function saveDiary(){

let text=document.getElementById("text").value;

let mood=document.getElementById("mood").value;

let files=document.getElementById("media").files;

let media=[];

let loaded=0;

if(files.length===0){

store(text,mood,media);

return;

}

for(let f of files){

let r=new FileReader();

r.onload=e=>{

media.push(e.target.result);

loaded++;

if(loaded===files.length){

store(text,mood,media);

}

}

r.readAsDataURL(f);

}

}

function store(text,mood,media){

let diary=JSON.parse(localStorage.diary||"[]");

let d=new Date();

diary.unshift({

date:d.toLocaleString(),

year:d.getFullYear(),

month:d.getMonth(),

day:d.getDate(),

text:text,

mood:mood,

media:media

});

localStorage.diary=JSON.stringify(diary);

loadDiary();

buildCalendar();

buildGraph();

}

function loadDiary(day=null){

let diary=JSON.parse(localStorage.diary||"[]");

let html="";

diary.forEach(e=>{

if(day && e.day!==day) return;

html+=`

<div class="entry">

<div>${e.date} ${e.mood}</div>

<div>${e.text}</div>

<div class="media">

${e.media.map(m=>`<img src="${m}" onclick="viewImage('${m}')">`).join("")}

</div>

</div>

`;

});

document.getElementById("diary").innerHTML=html;

}

function buildCalendar(){

let diary=JSON.parse(localStorage.diary||"[]");

let today=new Date();

let y=today.getFullYear();

let m=today.getMonth();

let last=new Date(y,m+1,0).getDate();

let html="";

for(let d=1;d<=last;d++){

let cls="day";

if(diary.some(e=>e.day===d)) cls+=" hasDiary";

html+=`<div class="${cls}" onclick="loadDiary(${d})">${d}</div>`;

}

document.getElementById("calendar").innerHTML=html;

}

function viewImage(src){

let w=window.open("");

w.document.write(`<img src="${src}" style="width:100%">`);

}

function buildGraph(){

let diary=JSON.parse(localStorage.diary||"[]");

let moods={};

diary.forEach(d=>{

moods[d.mood]=(moods[d.mood]||0)+1;

});

let ctx=document.getElementById("moodChart");

new Chart(ctx,{

type:"bar",

data:{

labels:Object.keys(moods),

datasets:[{

data:Object.values(moods)

}]

}

});

}

function backup(){

let data=localStorage.diary||"[]";

let blob=new Blob([data],{type:"application/json"});

let a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="diary_backup.json";

a.click();

}

if("serviceWorker" in navigator){

navigator.serviceWorker.register("sw.js");

}

loadDiary();

buildCalendar();

buildGraph();

</script>

</body>

</html>
