<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>神日記 Pro</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

body{
font-family:-apple-system;
margin:0;
background:#f2f4f8;
}

header{
background:#111;
color:white;
padding:15px;
text-align:center;
font-size:20px;
}

.container{
padding:15px;
max-width:800px;
margin:auto;
}

textarea{
width:100%;
height:90px;
border-radius:10px;
padding:10px;
border:1px solid #ccc;
}

button{
margin-top:8px;
padding:12px;
border:none;
border-radius:10px;
background:#007aff;
color:white;
width:100%;
}

.entry{
background:white;
margin-top:12px;
padding:12px;
border-radius:12px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:6px;
margin-top:8px;
}

.grid img,.grid video{
width:100%;
border-radius:8px;
}

.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:4px;
margin-top:10px;
}

.day{
background:white;
padding:8px;
text-align:center;
border-radius:6px;
font-size:12px;
}

.hasDiary{
background:#ffe082;
}

.search{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid #ccc;
}

.lock{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

</style>
</head>

<body>

<div id="lock" class="lock">
<h2>🔒 パスコード</h2>
<input type="password" id="pass">
<button onclick="unlock()">開く</button>
</div>

<header>📔 神日記 Pro</header>

<div class="container">

<input id="search" class="search" placeholder="🔍 日記検索">

<h3>😊 気分</h3>

<select id="mood">
<option>😀</option>
<option>😍</option>
<option>😊</option>
<option>😢</option>
<option>😡</option>
<option>😴</option>
</select>

<textarea id="text" placeholder="今日の出来事"></textarea>

<input type="file" id="photos" multiple accept="image/*,video/*">

<button onclick="recordVoice()">🎙 音声メモ</button>

<button onclick="getLocation()">📍 位置情報</button>

<button onclick="saveDiary()">保存</button>

<button onclick="backup()">☁️バックアップ</button>

<h3>📅 カレンダー</h3>
<div id="calendar" class="calendar"></div>

<h3>📚 日記</h3>
<div id="diary"></div>

</div>

<script>

if(!localStorage.pass){

let p=prompt("パスコード設定");
localStorage.pass=p;

}

function unlock(){

if(document.getElementById("pass").value===localStorage.pass){

document.getElementById("lock").style.display="none";

}

}

let locationText="";

function getLocation(){

navigator.geolocation.getCurrentPosition(pos=>{

locationText=`📍${pos.coords.latitude.toFixed(3)},${pos.coords.longitude.toFixed(3)}`;

alert("位置保存しました");

});

}

let voiceText="";

function recordVoice(){

const rec=new webkitSpeechRecognition();

rec.lang="ja-JP";

rec.onresult=e=>{

voiceText=e.results[0][0].transcript;

alert("音声保存");

};

rec.start();

}

function saveDiary(){

let text=document.getElementById("text").value+" "+voiceText+" "+locationText;

let mood=document.getElementById("mood").value;

let files=document.getElementById("photos").files;

let media=[];

let loaded=0;

if(files.length===0){

store(text,mood,media);

return;

}

for(let f of files){

let reader=new FileReader();

reader.onload=e=>{

media.push({type:f.type,data:e.target.result});

loaded++;

if(loaded===files.length){

store(text,mood,media);

}

};

reader.readAsDataURL(f);

}

}

function store(text,mood,media){

let diary=JSON.parse(localStorage.diary||"[]");

let day=new Date().getDate();

diary.unshift({

date:new Date().toLocaleString(),
day:day,
text:text,
mood:mood,
media:media

});

localStorage.diary=JSON.stringify(diary);

loadDiary();
buildCalendar();

}

function loadDiary(){

let diary=JSON.parse(localStorage.diary||"[]");

let key=document.getElementById("search").value;

let html="";

diary.forEach((e,i)=>{

if(key && !e.text.includes(key))return;

html+=`<div class="entry">

<div>${e.date} ${e.mood}</div>

<div>${e.text}</div>

<div class="grid">

${e.media.map(m=>{

if(m.type.includes("video"))

return `<video controls src="${m.data}"></video>`;

else

return `<img src="${m.data}">`;

}).join("")}

</div>

<button onclick="deleteDiary(${i})">削除</button>

</div>`;

});

document.getElementById("diary").innerHTML=html;

}

function deleteDiary(i){

let diary=JSON.parse(localStorage.diary||"[]");

diary.splice(i,1);

localStorage.diary=JSON.stringify(diary);

loadDiary();
buildCalendar();

}

document.getElementById("search").oninput=loadDiary;

function buildCalendar(){

let diary=JSON.parse(localStorage.diary||"[]");

let days=diary.map(d=>d.day);

let html="";

for(let i=1;i<=31;i++){

let cls=days.includes(i)?"day hasDiary":"day";

html+=`<div class="${cls}">${i}</div>`;

}

document.getElementById("calendar").innerHTML=html;

}

function backup(){

let data=localStorage.diary;

let blob=new Blob([data],{type:"application/json"});

let a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="diary_backup.json";

a.click();

}

loadDiary();
buildCalendar();

</script>

</body>
</html>
