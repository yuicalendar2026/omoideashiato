<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>フォト日記</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family: -apple-system;
background:#f4f6f8;
margin:0;
padding:20px;
}

h1{
text-align:center;
}

.container{
max-width:600px;
margin:auto;
}

textarea{
width:100%;
height:120px;
padding:10px;
border-radius:10px;
border:1px solid #ccc;
font-size:16px;
}

input[type="file"]{
margin-top:10px;
}

button{
margin-top:10px;
padding:12px;
width:100%;
border:none;
border-radius:10px;
background:#4CAF50;
color:white;
font-size:16px;
}

.entry{
background:white;
margin-top:20px;
padding:15px;
border-radius:12px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.images{
display:flex;
flex-wrap:wrap;
gap:8px;
margin-top:10px;
}

.images img{
width:90px;
height:90px;
object-fit:cover;
border-radius:8px;
}

.date{
font-size:14px;
color:#666;
}
</style>
</head>

<body>

<div class="container">

<h1>📔 フォト日記</h1>

<div class="entry">
<div class="date" id="today"></div>

<textarea id="text" placeholder="今日の出来事を書いてね"></textarea>

<input type="file" id="photos" multiple accept="image/*">

<button onclick="saveEntry()">保存</button>
</div>

<div id="diary"></div>

</div>

<script>

document.getElementById("today").innerText =
new Date().toLocaleDateString("ja-JP");

function saveEntry(){

const text = document.getElementById("text").value;
const files = document.getElementById("photos").files;

let images = [];

if(files.length>0){

let loaded=0;

for(let file of files){

let reader = new FileReader();

reader.onload = function(e){

images.push(e.target.result);
loaded++;

if(loaded===files.length){
store(text,images);
}

}

reader.readAsDataURL(file);

}

}else{

store(text,images);

}

}

function store(text,images){

let diary = JSON.parse(localStorage.getItem("diary")||"[]");

diary.unshift({
date:new Date().toLocaleString(),
text:text,
images:images
});

localStorage.setItem("diary",JSON.stringify(diary));

document.getElementById("text").value="";
document.getElementById("photos").value="";

loadDiary();

}

function loadDiary(){

let diary = JSON.parse(localStorage.getItem("diary")||"[]");

let html="";

diary.forEach(entry=>{

html+=`
<div class="entry">
<div class="date">${entry.date}</div>
<div>${entry.text}</div>
<div class="images">
${entry.images.map(img=>`<img src="${img}">`).join("")}
</div>
</div>
`;

});

document.getElementById("diary").innerHTML=html;

}

loadDiary();

</script>

</body>
</html>
