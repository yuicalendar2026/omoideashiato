<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>フォト日記</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:-apple-system;
background:#f2f2f2;
margin:0;
padding:20px;
}

.container{
max-width:600px;
margin:auto;
}

h1{
text-align:center;
}

textarea{
width:100%;
height:120px;
border-radius:10px;
border:1px solid #ccc;
padding:10px;
font-size:16px;
}

button{
margin-top:12px;
padding:14px;
width:100%;
font-size:18px;
background:#2ecc71;
border:none;
border-radius:12px;
color:white;
}

.entry{
background:white;
padding:15px;
margin-top:20px;
border-radius:12px;
}

.images{
display:flex;
flex-wrap:wrap;
gap:8px;
margin-top:10px;
}

.images img{
width:90px;
height:90px;
object-fit:cover;
border-radius:8px;
}

.date{
font-size:13px;
color:#777;
margin-bottom:5px;
}

</style>
</head>

<body>

<div class="container">

<h1>📔 フォト日記</h1>

<div class="entry">

<div class="date" id="today"></div>

<textarea id="text" placeholder="今日の出来事"></textarea>

<input type="file" id="photos" multiple accept="image/*">

<button id="saveBtn">保存</button>

</div>

<div id="diary"></div>

</div>

<script>

const saveBtn = document.getElementById("saveBtn");
saveBtn.addEventListener("click", saveEntry);

document.getElementById("today").innerText =
new Date().toLocaleDateString("ja-JP");

function saveEntry(){

const text = document.getElementById("text").value;
const files = document.getElementById("photos").files;

let images=[];
let loaded=0;

if(files.length===0){

store(text,images);
return;

}

for(let file of files){

let reader = new FileReader();

reader.onload=function(e){

images.push(e.target.result);
loaded++;

if(loaded===files.length){

store(text,images);

}

}

reader.readAsDataURL(file);

}

}

function store(text,images){

let diary = JSON.parse(localStorage.getItem("diary")||"[]");

diary.unshift({
date:new Date().toLocaleString(),
text:text,
images:images
});

localStorage.setItem("diary",JSON.stringify(diary));

document.getElementById("text").value="";
document.getElementById("photos").value="";

loadDiary();

}

function loadDiary(){

let diary = JSON.parse(localStorage.getItem("diary")||"[]");

let html="";

diary.forEach(entry=>{

html+=`
<div class="entry">
<div class="date">${entry.date}</div>
<div>${entry.text}</div>
<div class="images">
${entry.images.map(img=>`<img src="${img}">`).join("")}
</div>
</div>
`;

});

document.getElementById("diary").innerHTML=html;

}

loadDiary();

</script>

</body>
</html>
