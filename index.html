<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>神フォト日記</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

body{
font-family:-apple-system;
margin:0;
background:#f4f6f8;
}

header{
background:#4A90E2;
color:white;
padding:15px;
text-align:center;
font-size:20px;
}

.container{
padding:15px;
max-width:700px;
margin:auto;
}

textarea{
width:100%;
height:100px;
border-radius:10px;
border:1px solid #ccc;
padding:10px;
}

button{
padding:12px;
border:none;
border-radius:10px;
background:#4A90E2;
color:white;
margin-top:10px;
width:100%;
}

.entry{
background:white;
padding:12px;
margin-top:12px;
border-radius:10px;
}

.images{
display:flex;
flex-wrap:wrap;
gap:6px;
margin-top:8px;
}

.images img{
width:90px;
height:90px;
object-fit:cover;
border-radius:8px;
}

.mood{
font-size:24px;
}

.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:5px;
margin-top:15px;
}

.day{
background:white;
padding:8px;
border-radius:6px;
font-size:12px;
text-align:center;
}

.search{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid #ccc;
}

.lock{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

</style>
</head>

<body>

<div id="lockScreen" class="lock">
<h2>🔒 パスコード</h2>
<input id="passInput" type="password">
<button onclick="unlock()">開く</button>
</div>

<header>📔 神フォト日記</header>

<div class="container">

<input class="search" id="search" placeholder="🔍 日記検索">

<h3>😊 気分</h3>

<select id="mood">
<option>😀</option>
<option>😍</option>
<option>😊</option>
<option>😢</option>
<option>😡</option>
<option>😴</option>
</select>

<textarea id="text" placeholder="今日の日記"></textarea>

<input type="file" id="photos" multiple accept="image/*">

<button onclick="saveDiary()">保存</button>

<button onclick="exportData()">☁️ バックアップ</button>

<h3>📅 カレンダー</h3>
<div id="calendar" class="calendar"></div>

<h3>📚 日記</h3>
<div id="diary"></div>

</div>

<script>

if(!localStorage.pass){

let p=prompt("初回パスコード設定");
localStorage.pass=p;

}

function unlock(){

let v=document.getElementById("passInput").value;

if(v===localStorage.pass){

document.getElementById("lockScreen").style.display="none";

}

}

function saveDiary(){

const text=document.getElementById("text").value;
const mood=document.getElementById("mood").value;
const files=document.getElementById("photos").files;

let images=[];
let loaded=0;

if(files.length===0){

store(text,mood,images);
return;

}

for(let file of files){

let reader=new FileReader();

reader.onload=e=>{

images.push(e.target.result);
loaded++;

if(loaded===files.length){

store(text,mood,images);

}

};

reader.readAsDataURL(file);

}

}

function store(text,mood,images){

let diary=JSON.parse(localStorage.diary||"[]");

diary.unshift({

date:new Date().toLocaleString(),
day:new Date().getDate(),
text:text,
mood:mood,
images:images

});

localStorage.diary=JSON.stringify(diary);

loadDiary();
buildCalendar();

}

function loadDiary(){

let diary=JSON.parse(localStorage.diary||"[]");

let keyword=document.getElementById("search").value;

let html="";

diary.forEach(e=>{

if(keyword && !e.text.includes(keyword)) return;

html+=`
<div class="entry">
<div>${e.date} <span class="mood">${e.mood}</span></div>
<div>${e.text}</div>
<div class="images">
${e.images.map(i=>`<img src="${i}">`).join("")}
</div>
</div>
`;

});

document.getElementById("diary").innerHTML=html;

}

document.getElementById("search").oninput=loadDiary;

function buildCalendar(){

let cal="";

for(let i=1;i<=31;i++){

cal+=`<div class="day">${i}</div>`;

}

document.getElementById("calendar").innerHTML=cal;

}

function exportData(){

let data=localStorage.diary;

let blob=new Blob([data],{type:"application/json"});

let a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="diary_backup.json";

a.click();

}

loadDiary();
buildCalendar();

</script>

</body>
</html>
