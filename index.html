  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { margin: 0; }
    .btn { cursor: pointer; border: none; background: none; }
    .fade-in { animation: fadeIn 0.35s ease forwards; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .day-cell { transition: all 0.18s ease; }
    .day-cell:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(80,220,120,0.25), 0 0 0 1px rgba(212,175,55,0.4); }
    textarea:focus { outline: none; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: rgba(212,175,55,0.4); border-radius: 2px; }
    @keyframes shimmer {
      0% { transform: translateX(-200%) skewX(-20deg); }
      100% { transform: translateX(600%) skewX(-20deg); }
    }
    @keyframes gemPulse1 {
      0%,100% { transform: translate(0,0) scale(1); opacity:0.6; }
      50% { transform: translate(15px,-25px) scale(1.15); opacity:1; }
    }
    @keyframes gemPulse2 {
      0%,100% { transform: translate(0,0) scale(1); opacity:0.4; }
      50% { transform: translate(-20px,18px) scale(0.88); opacity:0.75; }
    }
    @keyframes gemPulse3 {
      0%,100% { transform: translate(0,0) scale(1); opacity:0.5; }
      33% { transform: translate(12px,20px) scale(1.08); opacity:0.8; }
      66% { transform: translate(-8px,-15px) scale(0.94); opacity:0.6; }
    }
    @keyframes twinkle {
      0%,100% { opacity:0.2; transform:scale(0.8); }
      50% { opacity:1; transform:scale(1.2); }
    }
    .gem1 { animation: gemPulse1 9s ease-in-out infinite; }
    .gem2 { animation: gemPulse2 13s ease-in-out infinite; }
    .gem3 { animation: gemPulse3 16s ease-in-out infinite; }
    .gem4 { animation: gemPulse1 11s ease-in-out infinite reverse; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useCallback } = React;

    const MONTHS = ["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];
    const DAYS = ["日","月","火","水","木","金","土"];
    const WEATHERS = [
      { emoji: "☀️", label: "晴れ" },
      { emoji: "⛅", label: "曇り" },
      { emoji: "🌂", label: "雨" },
      { emoji: "❄️", label: "雪" },
      { emoji: "🌈", label: "虹" },
    ];

    function getYearKyusei(year) { return ((11-(year-1984)%9)%9)+1; }
    function getMonthKyusei(year, month) {
      const y = getYearKyusei(year);
      const mo = [2,1,9,8,7,6,5,4,3,2,1,9][month];
      return ((y+mo-2)%9)+1;
    }
    const KYUSEI_LUCKY = {
      1:["北","南西"],2:["南西","東北"],3:["東","南東"],
      4:["南東","東"],5:["北","南"],6:["西北","西"],
      7:["西","西北"],8:["東北","南西"],9:["南","東南"],
    };
    const KYUSEI_NAME = {1:"一白水星",2:"二黒土星",3:"三碧木星",4:"四緑木星",
      5:"五黄土星",6:"六白金星",7:"七赤金星",8:"八白土星",9:"九紫火星"};
    const DIR_ANGLE = {
      "北":270,"東北":315,"東":0,"南東":45,"南":90,"南西":135,"西":180,"西北":225
    };

    const ROKUYO = ["大安","赤口","先勝","友引","先負","仏滅"];
    const ROKUYO_COLOR = {
      "大安": "#e8734a","赤口": "#cc4444","先勝": "#4a90d9",
      "友引": "#5daa6e","先負": "#8a7cb8","仏滅": "#999",
    };
    const JUNISHI = ["子","丑","寅","卯","辰","巳","午","未","申","酉","戌","亥"];
    const JUNISHI_EMOJI = ["🐭","🐮","🐯","🐰","🐲","🐍","🐴","🐑","🐵","🐓","🐶","🐷"];

    function getYearJunishi(year) { return (year - 1984 + 120) % 12; }

    function toJD(y, m, d) {
      const a = Math.floor((14 - m) / 12);
      const yr = y + 4800 - a;
      const mo = m + 12 * a - 3;
      return d + Math.floor((153 * mo + 2) / 5) + 365 * yr + Math.floor(yr / 4)
        - Math.floor(yr / 100) + Math.floor(yr / 400) - 32045;
    }

    function getLunarNewMoons(year) {
      const moons = [];
      const k0 = Math.round((year - 2000) * 12.3685);
      for (let k = k0 - 14; k <= k0 + 14; k++) {
        const T = k / 1236.85;
        let JDE = 2451550.09766 + 29.530588861 * k
          + 0.00015437 * T * T - 0.000000150 * T * T * T
          + 0.00000000073 * T * T * T * T;
        const M = (2.5534 + 29.10535670 * k) * Math.PI / 180;
        const Mprime = (201.5643 + 385.81693528 * k) * Math.PI / 180;
        const F = (160.7108 + 390.67050284 * k) * Math.PI / 180;
        JDE += -0.40720 * Math.sin(Mprime) + 0.17241 * Math.sin(M)
          + 0.01608 * Math.sin(2 * Mprime) + 0.01039 * Math.sin(2 * F)
          + 0.00739 * Math.sin(Mprime - M) - 0.00514 * Math.sin(Mprime + M);
        moons.push(Math.round(JDE - 0.5));
      }
      return moons.sort((a, b) => a - b);
    }

    function solarToLunar(year, month, day) {
      const lunarNewMoons = getLunarNewMoons(year);
      const jd = toJD(year, month, day);
      let lunarMonth = 1, lunarDay = 1;
      for (let i = 0; i < lunarNewMoons.length - 1; i++) {
        if (jd >= lunarNewMoons[i] && jd < lunarNewMoons[i + 1]) {
          lunarMonth = (i % 12) + 1;
          lunarDay = Math.floor(jd - lunarNewMoons[i]) + 1;
          break;
        }
      }
      return { month: lunarMonth, day: lunarDay };
    }

    function getRokuyo(year, month, day) {
      try {
        const lunar = solarToLunar(year, month, day);
        const idx = (lunar.month + lunar.day - 2) % 6;
        return ROKUYO[(idx + 6) % 6];
      } catch { return ROKUYO[0]; }
    }

    function getDayKanshi(year, month, day) {
      const jd = toJD(year, month, day);
      const kan = ((jd % 10) + 10) % 10;
      const shi = ((jd % 12) + 12) % 12;
      return { kan, shi };
    }

    const ICHIRYUMAN_SHISHI = {
      1:[0,6],2:[3,9],3:[0,6],4:[3,9],5:[2,8],6:[5,11],
      7:[2,8],8:[5,11],9:[0,6],10:[3,9],11:[0,6],12:[3,9],
    };
    function isIchiryumanbai(year, month, day) {
      try {
        const lunar = solarToLunar(year, month, day);
        const { shi } = getDayKanshi(year, month, day);
        return (ICHIRYUMAN_SHISHI[lunar.month] || []).includes(shi);
      } catch { return false; }
    }

    const TENSHADAY_MAP = {
      1:{kan:4,shi:2},2:{kan:4,shi:2},3:{kan:4,shi:2},
      4:{kan:0,shi:6},5:{kan:0,shi:6},6:{kan:0,shi:6},
      7:{kan:4,shi:8},8:{kan:4,shi:8},9:{kan:4,shi:8},
      10:{kan:0,shi:0},11:{kan:0,shi:0},12:{kan:0,shi:0},
    };
    function isTenshaDay(year, month, day) {
      try {
        const lunar = solarToLunar(year, month, day);
        const target = TENSHADAY_MAP[lunar.month];
        if (!target) return false;
        const { kan, shi } = getDayKanshi(year, month, day);
        return kan === target.kan && shi === target.shi;
      } catch { return false; }
    }

    function getLuckyDay(year, month, day) {
      const { shi } = getDayKanshi(year, month, day);
      const rokuyo = getRokuyo(year, month, day);
      const lucky = [];
      if (isTenshaDay(year, month, day))
        lucky.push({ name: "天赦日", color: "#c0392b", rank: 4 });
      if (rokuyo === "大安")
        lucky.push({ name: "大安", color: "#e8734a", rank: 3 });
      if (isIchiryumanbai(year, month, day))
        lucky.push({ name: "一粒万倍日", color: "#d4820a", rank: 2 });
      if (shi === 2)
        lucky.push({ name: "寅の日", color: "#7b5ea7", rank: 1 });
      if (shi === 5)
        lucky.push({ name: "巳の日", color: "#5daa6e", rank: 1 });
      return lucky;
    }

    // ── 月相（新月・満月）────────────────────────────────────
    function getMoonPhase(year, month, day) {
      // 朔（新月）のユリウス日リストを使って月相を計算
      const moons = getLunarNewMoons(year);
      const jd = toJD(year, month, day);
      // 直近の新月を探す
      let prevNew = moons[0];
      for (let i = 0; i < moons.length; i++) {
        if (moons[i] <= jd) prevNew = moons[i];
        else break;
      }
      const age = jd - prevNew; // 新月からの日数（synodic month ≈ 29.53日）
      const synodic = 29.530588861;
      const phase = age / synodic; // 0〜1
      if (age <= 0.9 || age >= synodic - 0.9) return "🌑"; // 新月
      if (Math.abs(phase - 0.5) <= 0.03) return "🌕";      // 満月
      return null;
    }

    function getDaysInMonth(y, m) { return new Date(y, m + 1, 0).getDate(); }
    function getFirstDay(y, m) { return new Date(y, m, 1).getDay(); }
    const today = new Date();

              <circle cx={cx} cy={cy} r={r} fill="rgba(248,248,255,0.8)" stroke="rgba(180,180,220,0.3)" strokeWidth="1"/>
              {luckyDirs.map((dir,i) => {
                const a = (DIR_ANGLE[dir]-22.5)*Math.PI/180;
                const b = (DIR_ANGLE[dir]+22.5)*Math.PI/180;
                const x1=cx+r*Math.cos(a), y1=cy+r*Math.sin(a);
                const x2=cx+r*Math.cos(b), y2=cy+r*Math.sin(b);
                return (

                fontSize:"22px", color:"white", fontWeight:300, letterSpacing:"2px",
                textShadow:"0 2px 12px rgba(0,0,0,0.2)",
              }}>写真日記帳</div>
              <div style={{fontSize:"11px", color:"rgba(255,255,255,0.9)", marginTop:"3px", letterSpacing:"1px"}}>
                {currentYear}年 {JUNISHI_EMOJI[yearJunishiIdx]}{JUNISHI[yearJunishiIdx]}年
              </div>
            </div>
            <div style={{textAlign:"center"}}>
              <div style={{
                width:"46px", height:"46px", borderRadius:"50%", margin:"0 auto 3px",
                background:"rgba(255,255,255,0.25)", border:"1.5px solid rgba(255,255,255,0.5)",
                display:"flex", alignItems:"center", justifyContent:"center", fontSize:"20px",
              }}>📷</div>
              <div style={{fontSize:"11px", color:"rgba(255,255,255,0.9)"}}>{totalPhotos}枚</div>
            </div>
          </div>

          {/* Calendar View */}
          {view === "calendar" && (
            <div className="fade-in" style={{padding:"18px 12px", maxWidth:"540px", margin:"0 auto", position:"relative", zIndex:1}}>

              {/* Month Nav */}
              <div style={{
                display:"flex", alignItems:"center", justifyContent:"space-between",
                marginBottom:"16px", background:"white", borderRadius:"18px",
                padding:"14px 18px", boxShadow:"0 4px 20px rgba(0,0,0,0.08)",
                border:"1px solid rgba(220,220,240,0.8)",
              }}>
                <button className="btn" onClick={prevMonth} style={{
                  width:"34px", height:"34px", borderRadius:"50%",
                  background:"linear-gradient(135deg, #f0e8ff, #e8f4ff)",
                  fontSize:"16px", display:"flex", alignItems:"center", justifyContent:"center",
                  color:"#7060c0", boxShadow:"0 2px 8px rgba(120,100,200,0.15)",
                  border:"1px solid rgba(180,160,240,0.4)",
                }}>‹</button>
                <div style={{textAlign:"center"}}>
                  <div style={{
                    fontFamily:"'Noto Serif JP', serif",
                    fontSize:"24px", fontWeight:400, color:"#2a2a4a", letterSpacing:"2px",
                  }}>{MONTHS[currentMonth]}</div>
                  <div style={{fontSize:"11px", color:"#9980d0", letterSpacing:"2px", marginTop:"1px"}}>{currentYear}</div>
                </div>
                <button className="btn" onClick={nextMonth} style={{
                  width:"34px", height:"34px", borderRadius:"50%",
                  background:"linear-gradient(135deg, #f0e8ff, #e8f4ff)",
                  fontSize:"16px", display:"flex", alignItems:"center", justifyContent:"center",
                  color:"#7060c0", boxShadow:"0 2px 8px rgba(120,100,200,0.15)",
                  border:"1px solid rgba(180,160,240,0.4)",
                }}>›</button>
              </div>

              {/* Day headers */}
              <div style={{display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:"3px", marginBottom:"5px"}}>
                {DAYS.map((d,i) => (
                  <div key={d} style={{
                    textAlign:"center", fontSize:"11px", fontWeight:500, padding:"2px 0",
                    color: i===0?"#ff6060":i===6?"#4090ff":"#888aaa",
                  }}>{d}</div>
                ))}
              </div>

              {/* Grid */}
              <div style={{display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:"3px"}}>
                {cells.map((day,i) => {
                  if (!day) return <div key={`e-${i}`}/>;
                  const k = key(currentYear, currentMonth, day);
                  const entry = entries[k];
                  const photos = entry?.photos || [];
                  const mainPhoto = photos[0];
                  const isToday = day===today.getDate() && currentMonth===today.getMonth() && currentYear===today.getFullYear();
                  const dow = (firstDay+day-1)%7;
                  const rokuyo = getRokuyo(currentYear, currentMonth, day);
                  const lucky = getLuckyDay(currentYear, currentMonth, day);
                  const moonPhase = getMoonPhase(currentYear, currentMonth, day);
                  const isLucky = lucky.length > 0;
                  const shadow = mainPhoto ? "0 1px 4px rgba(0,0,0,0.85)" : "none";
                  const rokuyoColor = mainPhoto ? "rgba(255,255,180,0.95)"
                    : isToday ? "white"
                    : rokuyo==="大安" ? "#e07030" : rokuyo==="赤口" ? "#cc3333"
                    : rokuyo==="友引" ? "#2a9a50" : rokuyo==="先勝" ? "#2266cc"
                    : rokuyo==="先負" ? "#7755bb" : "#aaaaaa";
                  return (
                    <button key={day} className="day-cell btn" onClick={()=>openEntry(day)} style={{
                      borderRadius:"10px", padding:0, overflow:"hidden",
                      position:"relative", cursor:"pointer", aspectRatio:"1 / 1.65",
                      background: mainPhoto ? "transparent"
                        : isToday ? "linear-gradient(160deg, #ff9a3c, #ffcd3c)"
                        : isLucky ? "linear-gradient(160deg, #fff8e0, #fff0f8)"
                        : "white",
                      border: isToday ? "2px solid #ff9a3c"
                        : isLucky ? "1.5px solid #ffb347"
                        : "1.5px solid rgba(220,220,240,0.8)",
                      boxShadow: isToday ? "0 3px 12px rgba(255,160,40,0.4)"
                        : isLucky ? "0 2px 10px rgba(255,180,80,0.2)"
                        : "0 1px 4px rgba(0,0,0,0.06)",
                    }}>
                      {mainPhoto && <>
                        <img src={mainPhoto} alt="" style={{width:"100%",height:"100%",objectFit:"cover",position:"absolute",inset:0}}/>
                        <div style={{position:"absolute",inset:0,background:"linear-gradient(to bottom, rgba(0,0,0,0.05), rgba(0,0,0,0.6))"}}/>
                      </>}
                      <div style={{
                        position:"relative", height:"100%",
                        display:"flex", flexDirection:"column",
                        alignItems:"center", justifyContent:"space-evenly", padding:"3px 1px",
                      }}>
                        <span style={{
                          fontSize:"13px", fontWeight:isToday?700:500, lineHeight:1,
                          color: mainPhoto?"white":isToday?"white":dow===0?"#ff4444":dow===6?"#2266ff":"#333355",
                          textShadow:shadow,
                        }}>{day}</span>
                        <span style={{
                          fontSize:"8px", fontWeight:rokuyo==="大安"?700:400,
                          lineHeight:1, letterSpacing:"-0.5px",
                          color:rokuyoColor, textShadow:mainPhoto?"0 1px 3px rgba(0,0,0,0.9)":"none",
                        }}>{rokuyo}</span>
                        <div style={{display:"flex", flexDirection:"column", alignItems:"center", gap:"1px"}}>
                          {lucky.filter(l=>l.name!=="大安").sort((a,b)=>b.rank-a.rank).map(l => (
                            <span key={l.name} style={{
                              fontSize:"6.5px", lineHeight:1.2, fontWeight:700, letterSpacing:"-0.3px",
                              color: mainPhoto?"rgba(255,240,180,0.95)":isToday?"white":"#d4820a",
                              textShadow:mainPhoto?"0 1px 3px rgba(0,0,0,0.9)":"none",
                            }}>{l.name}</span>
                          ))}
                        </div>
                        {entry?.weather && (
                          <span style={{fontSize:"10px", lineHeight:1, textShadow:shadow}}>{entry.weather}</span>
                        )}
                      </div>
                      {photos.length > 1 && (
                        <span style={{
                          position:"absolute", bottom:"2px", right:"3px",
                          fontSize:"7px", color:"white", fontWeight:700,
                          textShadow:"0 1px 3px rgba(0,0,0,1)",
                        }}>+{photos.length-1}</span>
                      )}
                      {moonPhase && (
                        <span style={{
                          position:"absolute", top:"2px", right:"3px",
                          fontSize:"10px", lineHeight:1,
                          filter: mainPhoto ? "drop-shadow(0 1px 2px rgba(0,0,0,0.8))" : "none",
                        }}>{moonPhase}</span>
                      )}
                    </button>
                  );
                })}
              </div>

              {/* 凡例 */}
              <div style={{
                marginTop:"14px", background:"white", borderRadius:"14px",
                padding:"12px 14px", boxShadow:"0 2px 16px rgba(0,0,0,0.07)",
                border:"1px solid rgba(220,220,240,0.8)",
              }}>
                <div style={{fontSize:"10px", color:"#9980d0", letterSpacing:"2px", marginBottom:"8px", fontWeight:500}}>六曜・開運日・月相</div>
                <div style={{display:"flex", flexWrap:"wrap", gap:"5px 10px", marginBottom:"7px"}}>
                  {ROKUYO.map(r => (
                    <span key={r} style={{fontSize:"10px", color:r==="大安"?"#e07030":"#555577", fontWeight:r==="大安"?700:400}}>
                      {r==="大安"?"✦ ":""}{r}
                    </span>
                  ))}
                </div>
                <div style={{display:"flex", flexWrap:"wrap", gap:"5px"}}>
                  <span style={{fontSize:"10px",color:"#c0392b",background:"#fff5f5",borderRadius:"8px",padding:"1px 7px",border:"1px solid #f5c0c0"}}>天赦日</span>
                  <span style={{fontSize:"10px",color:"#d4820a",background:"#fffbee",borderRadius:"8px",padding:"1px 7px",border:"1px solid #f5e0a0"}}>一粒万倍日</span>
                  <span style={{fontSize:"10px",color:"#7b5ea7",background:"#f8f4ff",borderRadius:"8px",padding:"1px 7px",border:"1px solid #ddd0f0"}}>寅の日</span>
                  <span style={{fontSize:"10px",color:"#5daa6e",background:"#f4fff8",borderRadius:"8px",padding:"1px 7px",border:"1px solid #b8e8c8"}}>巳の日</span>
                  <span style={{fontSize:"10px",color:"#334466",background:"#f0f4ff",borderRadius:"8px",padding:"1px 7px",border:"1px solid #c8d4f0"}}>🌑 新月</span>
                  <span style={{fontSize:"10px",color:"#665500",background:"#fffdf0",borderRadius:"8px",padding:"1px 7px",border:"1px solid #e8e0a0"}}>🌕 満月</span>
                </div>
              </div>

              {/* Stats */}
              <div style={{
                marginTop:"10px", background:"white", borderRadius:"14px",
                padding:"12px 16px", boxShadow:"0 2px 16px rgba(0,0,0,0.07)",
                border:"1px solid rgba(220,220,240,0.8)", display:"flex",
              }}>
                {[
                  {label:"今月の記録", value:monthEntries, unit:"日"},
                  {label:"今月の写真", value:monthPhotos, unit:"枚"},
                  {label:"総写真数", value:totalPhotos, unit:"枚"},
                ].map((s,i) => (
                  <div key={s.label} style={{
                    flex:1, textAlign:"center",
                    borderRight: i<2?"1px solid #eeeeee":"none",
                  }}>
                    <div style={{
                      fontFamily:"'Cormorant Garamond', serif",
                      fontSize:"22px", color:"#7060c0", fontWeight:400,
                    }}>{s.value}<span style={{fontSize:"11px"}}>{s.unit}</span></div>
                    <div style={{fontSize:"10px", color:"#aaaacc"}}>{s.label}</div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Entry View */}
          {view === "entry" && selectedDay && (
            <div className="fade-in" style={{maxWidth:"540px", margin:"0 auto"}}>
              <div style={{
                background:"white", padding:"14px 14px 0",
                borderBottom:"1px solid #eeeeee",
              }}>
                <div style={{display:"flex", alignItems:"center", gap:"10px", marginBottom:"12px"}}>
                  <button className="btn" onClick={()=>setView("calendar")} style={{
                    width:"34px", height:"34px", borderRadius:"50%",
                    background:"linear-gradient(135deg, #f0e8ff, #e8f4ff)",
                    fontSize:"17px", display:"flex", alignItems:"center", justifyContent:"center",
                    color:"#7060c0", boxShadow:"0 2px 8px rgba(120,100,200,0.15)",
                    border:"1px solid rgba(180,160,240,0.4)",
                  }}>←</button>
                  <div style={{flex:1}}>
                    <div style={{
                      fontFamily:"'Noto Serif JP', serif",
                      fontSize:"18px", fontWeight:400, color:"#2a2a4a", letterSpacing:"1px",
                    }}>{currentYear}年{MONTHS[currentMonth]}{selectedDay}日
                      <span style={{fontSize:"13px", color:"#9990bb", marginLeft:"6px"}}>
                        {DAYS[new Date(currentYear,currentMonth,selectedDay).getDay()]}曜日
                      </span>
                    </div>
                    <div style={{display:"flex", flexWrap:"wrap", gap:"5px", marginTop:"5px"}}>
                      <span style={{
                        padding:"2px 8px", borderRadius:"20px", fontSize:"11px", fontWeight:500,
                        background:"#f8f4ff",
                        color: entryRokuyo ? ROKUYO_COLOR[entryRokuyo] : "#aaaacc",
                        border:`1px solid ${entryRokuyo ? ROKUYO_COLOR[entryRokuyo]+"44" : "#ddddee"}`,
                      }}>{entryRokuyo}</span>
                      {entryLucky.filter(l=>l.name!=="大安").map(l => (
                        <span key={l.name} style={{
                          padding:"2px 8px", borderRadius:"20px", fontSize:"11px", fontWeight:600,
                          background:"#fff8e8", color:"#d4820a", border:"1px solid #f0d090",
                        }}>{l.name}</span>
                      ))}
                    </div>
                  </div>
                </div>
              </div>

              <div style={{padding:"14px"}}>
                {/* Photos */}
                <div style={{
                  background:"white", borderRadius:"14px", padding:"13px", marginBottom:"10px",
                  boxShadow:"0 2px 12px rgba(0,0,0,0.07)", border:"1px solid rgba(220,220,240,0.8)",
                }}>
                  <div style={{fontSize:"11px", color:"#aaaacc", letterSpacing:"1px",
                    marginBottom:"10px", display:"flex", justifyContent:"space-between"}}>
                    <span>写真</span>
                    <span style={{color:"#ccccdd"}}>{draft.photos.length} / 9枚</span>
                  </div>
                  <PhotoGrid photos={draft.photos} onAdd={addPhoto} onRemove={removePhoto}
                    onOpen={i=>setLightbox({photos:draft.photos, index:i})}/>
                </div>

                {/* Weather */}
                <div style={{
                  background:"white", borderRadius:"14px", padding:"12px 13px", marginBottom:"10px",
                  boxShadow:"0 2px 12px rgba(0,0,0,0.07)", border:"1px solid rgba(220,220,240,0.8)",
                }}>
                  <div style={{fontSize:"11px", color:"#aaaacc", letterSpacing:"1px", marginBottom:"9px"}}>今日の天気</div>
                  <div style={{display:"flex", gap:"5px"}}>
                    {WEATHERS.map(w => (
                      <button key={w.emoji} className="btn"
                        onClick={()=>setDraft(d=>({...d, weather:d.weather===w.emoji?null:w.emoji}))}
                        style={{
                          flex:1, padding:"7px 2px", borderRadius:"10px",
                          background: draft.weather===w.emoji
                            ? "linear-gradient(135deg, #4da6ff, #a0d4ff)" : "#f8f8ff",
                          border: draft.weather===w.emoji ? "2px solid #4da6ff" : "2px solid #e8e8f0",
                          display:"flex", flexDirection:"column", alignItems:"center", gap:"2px",
                          transition:"all 0.2s",
                        }}>
                        <span style={{fontSize:"18px"}}>{w.emoji}</span>
                        <span style={{fontSize:"8px", color:draft.weather===w.emoji?"white":"#aaaacc"}}>{w.label}</span>
                      </button>
                    ))}
                  </div>
                </div>

                {/* Compass */}
                <LuckyCompass year={currentYear} month={currentMonth}/>

                {/* Text */}
                <div style={{
                  background:"white", borderRadius:"14px", padding:"12px 13px", marginBottom:"14px",
                  boxShadow:"0 2px 12px rgba(0,0,0,0.07)", border:"1px solid rgba(220,220,240,0.8)",
                }}>
                  <div style={{fontSize:"11px", color:"#aaaacc", letterSpacing:"1px", marginBottom:"8px"}}>日記</div>
                  <textarea
                    value={draft.text}
                    onChange={e=>setDraft(d=>({...d, text:e.target.value}))}
                    placeholder="今日の出来事を書いてみよう..."
                    rows={5}
                    style={{
                      width:"100%", border:"none", resize:"none",
                      fontSize:"15px", lineHeight:"1.9", color:"#333355",
                      background:"transparent",
                      fontFamily:"'Noto Serif JP', 'Hiragino Mincho ProN', serif",
                    }}
                  />
                  <div style={{textAlign:"right", fontSize:"11px", color:"#ccccdd"}}>
                    {draft.text.length}文字
                  </div>
                </div>

                {/* Save/Delete */}
                <div style={{display:"flex", gap:"10px"}}>
                  {entries[key(currentYear, currentMonth, selectedDay)] && (
                    <button className="btn"
                      onClick={()=>{
                        const k=key(currentYear,currentMonth,selectedDay);
                        setEntries(prev=>{const n={...prev};delete n[k];return n;});
                        setView("calendar");
                      }}
                      style={{
                        padding:"13px 15px", borderRadius:"13px",
                        background:"#fff0f0", border:"1.5px solid #ffcccc",
                        fontSize:"16px", cursor:"pointer",
                      }}>🗑</button>
                  )}
                  <button className="btn" onClick={saveEntry} style={{
                    flex:1, padding:"13px", borderRadius:"13px",
                    background:"linear-gradient(135deg, #ff6b9d, #ff9a3c, #ffcd3c, #3cd9a0, #4da6ff)",
                    color:"white", fontSize:"14px", letterSpacing:"2px",
                    fontFamily:"'Noto Serif JP', serif", fontWeight:500,
                    boxShadow:"0 4px 20px rgba(255,100,150,0.3)",
                    cursor:"pointer", textShadow:"0 1px 4px rgba(0,0,0,0.3)",
                  }}>保存する</button>
                </div>
              </div>
            </div>
          )}

          {lightbox && (
            <Lightbox photos={lightbox.photos} index={lightbox.index} onClose={()=>setLightbox(null)}/>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<PhotoDiary/>);
  </script>

</body>
</html>
